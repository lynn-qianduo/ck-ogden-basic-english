<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线状态 - Basic English 850</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .offline-card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            color: #1e3c72;
            margin-bottom: 12px;
            font-size: 24px;
        }
        p {
            color: #64748b;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        button {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #2a5298;
        }
        .tips {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">📡</div>
        <h1>网络连接已断开</h1>
        <p>请检查网络连接，重新连接后即可继续使用。<br>部分已缓存的内容仍可离线使用。</p>
        <button onclick="location.reload()">🔄 重新加载</button>
        <div class="tips">
            💡 提示：首次访问时请确保网络畅通，之后可离线使用已学内容
        </div>
    </div>
</body>
</html>
